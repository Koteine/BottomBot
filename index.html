<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Para Pa Bot</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
        background: linear-gradient(180deg, #111 0%, #171717 100%);
        color: #f5f5f5;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }
      .panel {
        width: 100%;
        max-width: 260px;
        background: #1f1f1f;
        border: 1px solid #2c2c2c;
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 18px;
        text-align: center;
        font-weight: 700;
      }
      .status-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-bottom: 16px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #ef4444;
        box-shadow: 0 0 8px rgba(239, 68, 68, 0.8);
      }
      .dot.active {
        background: #22c55e;
        box-shadow: 0 0 10px rgba(34, 197, 94, 0.9);
      }
      .status-text {
        font-size: 14px;
        color: #d4d4d4;
      }
      .button-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      button {
        border: none;
        border-radius: 10px;
        padding: 12px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.05s ease, opacity 0.2s ease;
      }
      button:active {
        transform: translateY(1px);
      }
      #startBtn {
        background: #22c55e;
        color: #052e16;
      }
      #stopBtn {
        background: #ef4444;
        color: #450a0a;
      }
      .hint {
        margin-top: 14px;
        font-size: 12px;
        color: #a3a3a3;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>Para Pa Bot</h1>
      <div class="status-row">
        <span id="statusDot" class="dot"></span>
        <span id="statusText" class="status-text">Stopped</span>
      </div>
      <div class="button-grid">
        <button id="startBtn" type="button">START</button>
        <button id="stopBtn" type="button">STOP</button>
      </div>
      <div class="hint">F10 toggles Start / Stop globally.</div>
    </main>

    <script>
      const { ipcRenderer } = require("electron");

      const statusDot = document.getElementById("statusDot");
      const statusText = document.getElementById("statusText");
      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");

      function setStatus(isRunning) {
        statusText.textContent = isRunning ? "Scanning" : "Stopped";
        statusDot.classList.toggle("active", isRunning);
      }

      async function refreshState() {
        const state = await ipcRenderer.invoke("bot:state");
        setStatus(Boolean(state?.isRunning));
      }

      startBtn.addEventListener("click", async () => {
        const state = await ipcRenderer.invoke("bot:start");
        setStatus(Boolean(state?.isRunning));
      });

      stopBtn.addEventListener("click", async () => {
        const state = await ipcRenderer.invoke("bot:stop");
        setStatus(Boolean(state?.isRunning));
      });

      ipcRenderer.on("bot:status", (_event, payload) => {
        setStatus(Boolean(payload?.isRunning));
      });

      refreshState();
    </script>
  </body>
</html>
