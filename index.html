<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Para Pa Bot</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
        background: #0a0d14;
        color: #eef2ff;
      }
      .panel {
        width: 220px;
        padding: 16px;
        border-radius: 12px;
        border: 1px solid #2b3244;
        background: #101623;
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.45);
      }
      .title {
        margin: 0;
        text-align: center;
        font-size: 18px;
      }
      .status-wrap {
        margin-top: 16px;
        text-align: center;
      }
      .status-label {
        font-size: 12px;
        color: #9aa6c9;
      }
      .status-value {
        margin-top: 6px;
        font-size: 16px;
        font-weight: 700;
      }
      .status-value.waiting {
        color: #94a3b8;
      }
      .status-value.scanning {
        color: #22c55e;
      }
      .status-value.perfect {
        color: #f97316;
      }
      #toggleBtn {
        margin-top: 18px;
        width: 100%;
        border: none;
        border-radius: 10px;
        padding: 11px;
        font-size: 14px;
        font-weight: 700;
        background: #2563eb;
        color: #eff6ff;
        cursor: pointer;
      }
      #toggleBtn.active {
        background: #ef4444;
      }
      .hint {
        margin-top: 12px;
        text-align: center;
        color: #8390b1;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1 class="title">Para Pa Bot</h1>

      <div class="status-wrap">
        <div class="status-label">Status</div>
        <div id="statusText" class="status-value waiting">Waiting</div>
      </div>

      <button id="toggleBtn" type="button">START</button>
      <div class="hint">Global toggle: F10</div>
    </main>

    <script>
      const { ipcRenderer } = require('electron');
      const toggleBtn = document.getElementById('toggleBtn');
      const statusText = document.getElementById('statusText');

      function setStatus(status, isRunning) {
        const normalized = String(status || 'Waiting');
        statusText.textContent = normalized;

        statusText.classList.remove('waiting', 'scanning', 'perfect');
        if (normalized === 'Perfect Active') {
          statusText.classList.add('perfect');
        } else if (normalized === 'Scanning') {
          statusText.classList.add('scanning');
        } else {
          statusText.classList.add('waiting');
        }

        toggleBtn.textContent = isRunning ? 'STOP' : 'START';
        toggleBtn.classList.toggle('active', isRunning);
      }

      toggleBtn.addEventListener('click', async () => {
        const state = await ipcRenderer.invoke('bot:toggle');
        setStatus(state?.status, Boolean(state?.isRunning));
      });

      ipcRenderer.on('bot:status', (_event, payload) => {
        setStatus(payload?.status, Boolean(payload?.isRunning));
      });

      (async () => {
        const state = await ipcRenderer.invoke('bot:state');
        setStatus(state?.status, Boolean(state?.isRunning));
      })();
    </script>
  </body>
</html>
